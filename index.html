<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="HSIEH MENG JU's Portfolio - AEC Informatics">
    <title>HSIEH MENG JU - Portfolio</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link href="./particle_text.css" rel="stylesheet">

    <style>
        /* Ensure the canvas covers the full viewport */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Style for the navigation */
        .navbar {
            position: fixed;
            width: 100%;
            z-index: 2;
            background: transparent;
        }

        /* Ensure text is visible over canvas */
        .nav-link {
            color: white !important;
            font-weight: bold;
            transition: color 0.3s ease;
        }

        .nav-link:hover {
            color: #ddd !important;
        }

        /* Custom styles for mobile responsiveness */
        @media (max-width: 991.98px) {
            .navbar-collapse {
                background: rgba(0, 0, 0, 0.8);
                padding: 1rem;
                border-radius: 8px;
                margin-top: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Canvas for particle effect -->
    <canvas id="particleCanvas"></canvas>

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <!-- Home button -->
            <a class="home-button navbar-brand" href="/">
                <!-- Add your logo or home icon here -->
            </a>

            <!-- Mobile toggle button -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Navigation links -->
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/main">MAIN</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/experience">EXPERIENCE</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/works">WORKS</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/blog">BLOG</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JavaScript -->
    <script src="./particle_text.js"></script>
</body>
</html>
